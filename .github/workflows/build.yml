name: Build RiMusic APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        # assembleDebug se bina kisi extra key ke APK ban jayega
        run: ./gradlew assembleDebug --stacktrace

      - name: Check Where APK is (Debug Log)
        # Ye step sirf check karne ke liye hai ki file kahan bani hai
        run: find . -name "*.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RiMusic-Premium-Build
          # Humne path ko flexible kar diya hai
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
          
